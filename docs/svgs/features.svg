        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Asset Bundle Inspector</text>
        <text class="content" x="40" y="78">Registered bundles &#8226; Source paths &#8226; Dependency graph</text>
        <text class="content" x="40" y="98">Track every JS/CSS bundle published per request</text>
