---
on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".gitattributes"
      - ".gitignore"
      - "CHANGELOG.md"
      - "docs/**"
      - "README.md"

  push: *ignore-paths

name: build

permissions:
  contents: read

jobs:
  phpunit:
    uses: yii2-framework/actions/.github/workflows/phpunit.yml@ea13c0f091d2e888be095dd0265544ff8276dc9f # v2.0.1
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      concurrency-group: phpunit-${{ github.workflow }}-${{ github.ref }}
      extensions: gd, intl, pdo, pdo_sqlite
      php-version: '["8.3","8.4","8.5"]'
