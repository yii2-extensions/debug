---
on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".gitattributes"
      - ".gitignore"
      - "CHANGELOG.md"
      - "docs/**"
      - "README.md"

  push: *ignore-paths

name: assets

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: assets-${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Verify Vite build reproduces dist.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install node.js.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies.
        run: npm ci

      - name: Build assets.
        run: npm run build

      # Surface drift between resources/src/ edits and the committed dist/ as a warning while the pipeline stabilises.
      # Promote to a hard failure (drop continue-on-error) once a full release cycle confirms reproducibility.
      - name: Detect dist drift.
        continue-on-error: true
        run: |
          if ! git diff --exit-code src/assets/dist/; then
            echo "::warning::src/assets/dist/ output differs from committed bundle. Run 'npm run build' and commit the result."
            exit 1
          fi
