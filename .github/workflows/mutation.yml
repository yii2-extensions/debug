---
on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".gitattributes"
      - ".gitignore"
      - "CHANGELOG.md"
      - "docs/**"
      - "README.md"

  push: *ignore-paths

name: mutation test

permissions:
  contents: read

jobs:
  mutation:
    uses: yii2-framework/actions/.github/workflows/infection.yml@ea13c0f091d2e888be095dd0265544ff8276dc9f # v2.0.1
    with:
      command-options: --threads=4 --ignore-msi-with-no-mutations
      phpstan: true
    secrets:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
